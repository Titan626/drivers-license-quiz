<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VIO Mock Quiz – Nigerian Driver's License</title>
<link rel="preconnect" href="https://rsms.me/" />
<link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
<style>
  :root {
    /* Linear-style palette, Nigerian green accent */
    --green: #008751;
    --green-hover: #00744a;
    --green-soft: #ecf6f1;
    --green-border: #cfe7da;

    --red: #e5484d;
    --red-soft: #fdedee;
    --red-border: #f5c6c8;

    --bg: #fbfbfc;
    --surface: #ffffff;
    --surface-2: #f6f7f8;
    --border: #ebebef;
    --border-strong: #dcdce0;

    --text: #08090a;
    --text-secondary: #6f6f78;
    --text-tertiary: #8a8a93;

    --shadow-sm: 0 1px 2px rgba(8,9,10,0.04);
    --shadow-md: 0 1px 2px rgba(8,9,10,0.04), 0 4px 16px rgba(8,9,10,0.04);

    --radius-sm: 6px;
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  @supports (font-variation-settings: normal) {
    :root { font-family: 'Inter var', Inter, -apple-system, BlinkMacSystemFont, sans-serif; }
  }

  * { box-sizing: border-box; }

  html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

  body {
    margin: 0;
    font-family: 'Inter var', Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    font-size: 14px;
    font-feature-settings: "cv11", "ss01", "ss03";
    padding: 32px 20px;
  }

  .wrap {
    max-width: 720px;
    margin: 0 auto;
  }

  /* Header — flat, minimal, Linear-style */
  header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom: none;
    padding: 20px 24px 18px;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    text-align: left;
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .logo-dot {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    background: var(--green);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: -0.02em;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.12);
  }
  header h1 {
    margin: 0;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.011em;
    color: var(--text);
  }
  header .subtitle {
    margin: 0;
    color: var(--text-secondary);
    font-size: 13px;
    letter-spacing: -0.005em;
  }
  .progress {
    background: var(--surface-2);
    height: 3px;
    border-radius: 2px;
    margin-top: 16px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: var(--green);
    width: 0%;
    transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* Card */
  .card {
    background: var(--surface);
    padding: 28px 24px;
    border: 1px solid var(--border);
    border-radius: 0 0 var(--radius-lg) var(--radius-lg);
    min-height: 360px;
  }

  .topic-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--green-soft);
    color: var(--green);
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
    margin-bottom: 16px;
    letter-spacing: -0.005em;
    border: 1px solid var(--green-border);
  }
  .topic-tag::before {
    content: "";
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--green);
  }
  .q-number {
    color: var(--text-tertiary);
    font-size: 12px;
    margin-bottom: 6px;
    letter-spacing: -0.005em;
    font-variant-numeric: tabular-nums;
  }
  .q-text {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.014em;
    margin: 0 0 20px 0;
    line-height: 1.35;
    color: var(--text);
  }
  .sign-wrap {
    display: flex;
    justify-content: center;
    margin: 0 0 20px 0;
    padding: 24px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
  }
  .sign-wrap svg {
    max-width: 140px;
    height: auto;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .option {
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--surface);
    cursor: pointer;
    text-align: left;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    transition: border-color 0.12s ease, background 0.12s ease, transform 0.12s ease;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    letter-spacing: -0.006em;
  }
  .option:hover:not(:disabled) {
    border-color: var(--border-strong);
    background: var(--surface-2);
  }
  .option:active:not(:disabled) {
    transform: translateY(0.5px);
  }
  .option:disabled { cursor: default; }

  .option-letter {
    display: inline-flex;
    width: 22px;
    height: 22px;
    background: var(--surface-2);
    color: var(--text-secondary);
    border: 1px solid var(--border);
    border-radius: 5px;
    align-items: center;
    justify-content: center;
    font-weight: 500;
    font-size: 11px;
    flex-shrink: 0;
    margin-top: 1px;
    font-variant-numeric: tabular-nums;
  }

  .option.correct {
    border-color: var(--green-border);
    background: var(--green-soft);
  }
  .option.correct .option-letter {
    background: var(--green);
    color: white;
    border-color: var(--green);
  }
  .option.wrong {
    border-color: var(--red-border);
    background: var(--red-soft);
  }
  .option.wrong .option-letter {
    background: var(--red);
    color: white;
    border-color: var(--red);
  }

  .explanation {
    margin-top: 16px;
    padding: 12px 14px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    font-size: 13px;
    color: var(--text-secondary);
    display: none;
    line-height: 1.55;
    letter-spacing: -0.005em;
  }
  .explanation.show { display: block; }
  .explanation strong {
    color: var(--text);
    display: block;
    margin-bottom: 4px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .controls {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .score {
    font-size: 12px;
    color: var(--text-secondary);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.005em;
  }
  .score strong { color: var(--text); font-weight: 600; }

  .nav-buttons {
    display: flex;
    gap: 6px;
  }
  button.nav {
    border: 1px solid var(--border-strong);
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: -0.005em;
    transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease, transform 0.08s ease;
    height: 32px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  button.prev {
    background: var(--surface);
    color: var(--text);
  }
  button.prev:hover:not(:disabled) {
    background: var(--surface-2);
    border-color: var(--border-strong);
  }
  button.next {
    background: var(--green);
    color: white;
    border-color: var(--green);
    box-shadow: var(--shadow-sm);
  }
  button.next:hover:not(:disabled) {
    background: var(--green-hover);
    border-color: var(--green-hover);
  }
  button.nav:active:not(:disabled) { transform: translateY(0.5px); }
  button.nav:disabled {
    background: var(--surface);
    color: var(--text-tertiary);
    border-color: var(--border);
    cursor: not-allowed;
    box-shadow: none;
  }

  /* Result screen */
  .result {
    text-align: center;
    padding: 20px 0;
  }
  .result-score {
    font-size: 56px;
    font-weight: 600;
    letter-spacing: -0.04em;
    color: var(--text);
    margin: 8px 0 4px;
    font-variant-numeric: tabular-nums;
  }
  .result-label {
    font-size: 12px;
    color: var(--text-tertiary);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 500;
  }
  .result-pct {
    font-size: 15px;
    color: var(--green);
    font-weight: 500;
    letter-spacing: -0.005em;
    font-variant-numeric: tabular-nums;
  }
  .result-message {
    font-size: 14px;
    color: var(--text-secondary);
    margin: 14px auto 24px;
    max-width: 420px;
    letter-spacing: -0.005em;
  }
  .breakdown {
    text-align: left;
    background: var(--surface-2);
    border: 1px solid var(--border);
    padding: 14px 16px;
    border-radius: var(--radius-md);
    margin: 20px 0;
  }
  .breakdown h3 {
    margin: 0 0 10px 0;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .breakdown-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    font-size: 13px;
    color: var(--text);
    border-bottom: 1px solid var(--border);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.005em;
  }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-row strong { font-weight: 600; }

  button.restart {
    background: var(--green);
    color: white;
    border: 1px solid var(--green);
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: -0.005em;
    height: 32px;
    transition: background 0.12s ease;
  }
  button.restart:hover { background: var(--green-hover); border-color: var(--green-hover); }

  footer {
    text-align: center;
    padding: 20px 16px;
    color: var(--text-tertiary);
    font-size: 12px;
    letter-spacing: -0.005em;
  }

  /* Tablet */
  @media (max-width: 640px) {
    body { padding: 16px 12px; }
    header { padding: 16px 18px 14px; }
    .card { padding: 22px 18px; min-height: 0; }
    .q-text { font-size: 16px; }
    .sign-wrap { padding: 18px; }
    .sign-wrap svg { max-width: 120px; }
  }

  /* Phone */
  @media (max-width: 480px) {
    body { padding: 12px 10px; font-size: 14px; }
    header { padding: 14px 16px 12px; border-radius: 10px 10px 0 0; }
    header h1 { font-size: 14px; }
    header .subtitle { font-size: 12px; }
    .card {
      padding: 18px 16px;
      border-radius: 0 0 10px 10px;
    }
    .q-text { font-size: 15px; line-height: 1.4; margin-bottom: 16px; }
    .topic-tag { margin-bottom: 12px; }
    .sign-wrap { padding: 14px; margin-bottom: 16px; }
    .sign-wrap svg { max-width: 110px; }

    .option {
      padding: 12px;
      font-size: 14px;
      gap: 10px;
      min-height: 44px; /* touch target */
    }
    .option-letter { width: 22px; height: 22px; }

    .explanation { font-size: 13px; padding: 12px; }

    /* Stack controls: score above buttons; buttons fill width */
    .controls {
      margin-top: 20px;
      padding-top: 16px;
      flex-direction: column;
      align-items: stretch;
      gap: 12px;
    }
    .score { text-align: center; }
    .nav-buttons { width: 100%; }
    button.nav {
      flex: 1;
      justify-content: center;
      height: 40px; /* touch target */
      font-size: 14px;
    }

    /* Result screen */
    .result-score { font-size: 44px; }
    .result-message { font-size: 13px; margin: 12px auto 20px; }
    .breakdown { padding: 12px 14px; }
    button.restart { height: 40px; padding: 0 20px; font-size: 14px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="header-top">
      <span class="logo-dot">VIO</span>
      <h1>Mock Quiz</h1>
    </div>
    <p class="subtitle">Nigerian Driver's License Practice Test · 40 Questions</p>
    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
  </header>
  <div class="card" id="card">
    <!-- injected by JS -->
  </div>
  <footer>Practice test only. Always refer to the FRSC Highway Code for official information.</footer>
</div>

<script>
const questions = [
  // ===== ROAD SIGNS =====
  {
    topic: "Road Signs",
    q: "This road sign means:",
    sign: `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><polygon points="60,10 140,10 190,60 190,140 140,190 60,190 10,140 10,60" fill="#d93025" stroke="white" stroke-width="6"/><polygon points="60,10 140,10 190,60 190,140 140,190 60,190 10,140 10,60" fill="none" stroke="#a52714" stroke-width="2"/><text x="100" y="118" font-family="Arial, sans-serif" font-size="42" font-weight="900" fill="white" text-anchor="middle">STOP</text></svg>`,
    options: [
      "Slow down and proceed with caution",
      "Come to a complete stop before proceeding",
      "Stop only if other vehicles are present",
      "Stop for pedestrians only"
    ],
    answer: 1,
    explain: "A STOP sign (red octagon) requires every driver to come to a complete halt at the stop line, check that the way is clear, then proceed."
  },
  {
    topic: "Road Signs",
    q: "Based on its shape and colour, what type of sign is this?",
    sign: `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><polygon points="100,15 190,180 10,180" fill="white" stroke="#d93025" stroke-width="14"/><text x="100" y="150" font-family="Arial, sans-serif" font-size="80" font-weight="900" fill="#1a1a1a" text-anchor="middle">!</text></svg>`,
    options: [
      "A regulatory (prohibitive) sign",
      "An informative / guide sign",
      "A warning sign",
      "A mandatory sign"
    ],
    answer: 2,
    explain: "Warning signs are triangular with a red border (point up). Circular red-bordered signs are regulatory (prohibitive); blue rectangles are informative; blue circles are mandatory."
  },
  {
    topic: "Road Signs",
    q: "This road sign means:",
    sign: `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="100" r="85" fill="white" stroke="#d93025" stroke-width="14"/><g transform="translate(45,80)"><rect x="5" y="15" width="100" height="22" rx="4" fill="#444"/><rect x="15" y="5" width="75" height="18" rx="6" fill="#444"/><circle cx="25" cy="40" r="8" fill="#1a1a1a"/><circle cx="85" cy="40" r="8" fill="#1a1a1a"/><rect x="20" y="10" width="25" height="12" rx="2" fill="#a8d5ff"/><rect x="55" y="10" width="25" height="12" rx="2" fill="#a8d5ff"/></g><line x1="35" y1="35" x2="165" y2="165" stroke="#d93025" stroke-width="12" stroke-linecap="round"/></svg>`,
    options: [
      "No overtaking",
      "No entry for motor vehicles",
      "End of restriction",
      "One-way street"
    ],
    answer: 1,
    explain: "A red circle with a vehicle symbol crossed out prohibits motor vehicles from entering that road."
  },
  {
    topic: "Road Signs",
    q: "This road sign means:",
    sign: `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="100" r="90" fill="#1967d2" stroke="white" stroke-width="6"/><circle cx="100" cy="100" r="90" fill="none" stroke="#0b4a9e" stroke-width="2"/><path d="M 55 100 L 125 100 L 125 75 L 160 105 L 125 135 L 125 110 L 55 110 Z" fill="white"/></svg>`,
    options: [
      "Right turn prohibited",
      "Warning: sharp right curve ahead",
      "Mandatory — you must turn right",
      "Right of way to vehicles on the right"
    ],
    answer: 2,
    explain: "Blue circular signs give mandatory (compulsory) instructions. A white right-arrow inside one means drivers must turn right."
  },
  {
    topic: "Road Signs",
    q: "This road sign means:",
    sign: `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><polygon points="100,15 190,180 10,180" fill="white" stroke="#d93025" stroke-width="14"/><rect x="92" y="70" width="16" height="60" rx="3" fill="#1a1a1a"/><circle cx="100" cy="150" r="10" fill="#1a1a1a"/></svg>`,
    options: [
      "Other danger ahead — proceed with caution",
      "First aid station",
      "Emergency vehicles only",
      "End of all restrictions"
    ],
    answer: 0,
    explain: "The exclamation-mark warning triangle is a general 'other danger' sign, warning of a hazard not covered by other specific signs."
  },

  // ===== TRAFFIC RULES & RIGHT OF WAY =====
  {
    topic: "Traffic Rules",
    q: "In Nigeria, you should normally overtake another vehicle on the:",
    options: [
      "Right side",
      "Left side",
      "Either side, depending on space",
      "Only on expressways"
    ],
    answer: 1,
    explain: "Nigeria drives on the right-hand side of the road, so overtaking is done on the LEFT of the vehicle you are passing."
  },
  {
    topic: "Traffic Rules",
    q: "At an uncontrolled intersection (no signs, signals, or officer), who should give way?",
    options: [
      "The driver who arrives later",
      "The driver approaching from the left",
      "The driver approaching from the right",
      "The driver of the smaller vehicle"
    ],
    answer: 1,
    explain: "At an uncontrolled junction, you must give way to traffic approaching from your right. So the driver on the LEFT gives way."
  },
  {
    topic: "Traffic Rules",
    q: "The maximum speed limit for a private car in a built-up (urban) area in Nigeria is:",
    options: [
      "30 km/h",
      "50 km/h",
      "80 km/h",
      "100 km/h"
    ],
    answer: 1,
    explain: "FRSC sets the limit at 50 km/h in built-up areas, 80 km/h on highways, and 100 km/h on expressways for cars."
  },
  {
    topic: "Traffic Rules",
    q: "Using a hand-held mobile phone while driving in Nigeria is:",
    options: [
      "Allowed if you drive slowly",
      "Allowed only for voice calls, not texting",
      "Prohibited — it is a recognised traffic offence (DUP)",
      "Allowed when stopped in traffic"
    ],
    answer: 2,
    explain: "Driving Under the Phone (DUP) is an FRSC offence carrying penalty points and a fine. Only properly installed hands-free systems are permitted."
  },
  {
    topic: "Traffic Rules",
    q: "Who is required to wear a seat belt in a moving vehicle?",
    options: [
      "Only the driver",
      "Only the driver and front passenger",
      "All occupants of the vehicle",
      "Only on expressways"
    ],
    answer: 2,
    explain: "Nigerian law requires ALL occupants — front and back seats — to wear seat belts at all times. Failure to do so is the SBV offence."
  },

  // ===== VEHICLE KNOWLEDGE =====
  {
    topic: "Vehicle Knowledge",
    q: "If the red oil pressure warning light comes on while you are driving, you should:",
    options: [
      "Continue to your destination and check later",
      "Pull over safely as soon as possible, stop the engine, and check the oil",
      "Drive faster to build pressure",
      "Ignore it if the engine sounds normal"
    ],
    answer: 1,
    explain: "The red oil light means oil pressure is dangerously low. Continuing to drive can destroy the engine in minutes. Stop and check immediately."
  },
  {
    topic: "Vehicle Knowledge",
    q: "The minimum legal tyre tread depth for a car tyre is approximately:",
    options: [
      "0.5 mm",
      "1.5 mm",
      "3 mm",
      "5 mm"
    ],
    answer: 1,
    explain: "Tyres worn below about 1.5 mm of tread are unsafe — they lose grip on wet roads and increase braking distance."
  },
  {
    topic: "Vehicle Knowledge",
    q: "If your brakes suddenly fail while driving, you should:",
    options: [
      "Jump out of the vehicle immediately",
      "Pump the brake pedal, shift to a lower gear, and use the handbrake gradually",
      "Switch off the ignition immediately",
      "Accelerate hard to change gears quickly"
    ],
    answer: 1,
    explain: "Pump the brakes to try to restore pressure, downshift to use engine braking, and apply the handbrake gently (never yank it). Avoid turning off the engine — you lose power steering."
  },
  {
    topic: "Vehicle Knowledge",
    q: "Before starting a long journey, which of these should you check?",
    options: [
      "Only the fuel level",
      "Only tyre pressure",
      "Tyres, oil, water/coolant, fuel, lights and brakes",
      "Only the brake fluid"
    ],
    answer: 2,
    explain: "Pre-trip checks cover fluids (oil, coolant, brake fluid), tyres (pressure + tread), lights, wipers, brakes and fuel — often remembered as POWER or FLOWER checks."
  },
  {
    topic: "Vehicle Knowledge",
    q: "If the engine temperature gauge shows the engine is overheating, you should:",
    options: [
      "Keep driving with the air-conditioning turned off",
      "Pour cold water directly on the hot engine",
      "Pull over safely, switch off the engine, and let it cool before opening the bonnet",
      "Open the radiator cap immediately to release steam"
    ],
    answer: 2,
    explain: "Continuing to drive can warp the cylinder head. Never open a hot radiator cap — the pressurised steam can cause severe burns. Let it cool first."
  },

  // ===== HIGHWAY CODE & PENALTIES =====
  {
    topic: "Highway Code",
    q: "FRSC stands for:",
    options: [
      "Federal Road Safety Commission",
      "Federal Road Safety Corps",
      "Federal Republic Safety Council",
      "Federal Roadworthiness and Safety Committee"
    ],
    answer: 1,
    explain: "The Federal Road Safety Corps is Nigeria's lead road-traffic agency, responsible for licensing, the Highway Code, and enforcement."
  },
  {
    topic: "Highway Code",
    q: "The minimum legal age to obtain a Nigerian driver's license is:",
    options: [
      "16 years",
      "17 years",
      "18 years",
      "21 years"
    ],
    answer: 2,
    explain: "You must be at least 18 years old to apply for a full Nigerian driver's license."
  },
  {
    topic: "Highway Code",
    q: "While driving in Nigeria, which documents must you carry in the vehicle?",
    options: [
      "Driver's license only",
      "Driver's license and vehicle license only",
      "Driver's license, vehicle license, insurance certificate, roadworthiness certificate and proof of ownership",
      "Driver's license and insurance only"

let current = 0;
let userAnswers = new Array(questions.length).fill(null); // per-question selected index

function computeScore() {
  let score = 0;
  const byTopic = {};
  userAnswers.forEach((a, idx) => {
    const q = questions[idx];
    byTopic[q.topic] = byTopic[q.topic] || { correct: 0, total: 0 };
    if (a !== null) {
      byTopic[q.topic].total++;
      if (a === q.answer) {
        score++;
        byTopic[q.topic].correct++;
      }
    }
  });
  return { score, byTopic };
}

function render() {
  const card = document.getElementById('card');
  const bar = document.getElementById('progressBar');
  bar.style.width = ((current) / questions.length * 100) + '%';

  if (current >= questions.length) {
    renderResult();
    bar.style.width = '100%';
    return;
  }

  const q = questions[current];
  const selected = userAnswers[current];
  const isAnswered = selected !== null;
  const { score } = computeScore();

  card.innerHTML = `
    <div class="topic-tag">${q.topic}</div>
    <div class="q-number">Question ${current + 1} of ${questions.length}</div>
    <h2 class="q-text">${q.q}</h2>
    ${q.sign ? `<div class="sign-wrap">${q.sign}</div>` : ''}
    <div class="options" id="options">
      ${q.options.map((opt, i) => {
        let cls = 'option';
        if (isAnswered) {
          if (i === q.answer) cls += ' correct';
          else if (i === selected) cls += ' wrong';
        }
        return `
          <button class="${cls}" data-i="${i}" ${isAnswered ? 'disabled' : ''}>
            <span class="option-letter">${String.fromCharCode(65 + i)}</span>
            <span>${opt}</span>
          </button>
        `;
      }).join('')}
    </div>
    <div class="explanation ${isAnswered ? 'show' : ''}" id="explanation">
      <strong>Explanation</strong>
      <span id="explainText">${isAnswered ? q.explain : ''}</span>
    </div>
    <div class="controls">
      <div class="score">Score: <strong><span id="scoreNum">${score}</span> / ${questions.length}</strong></div>
      <div class="nav-buttons">
        <button class="nav prev" id="prevBtn" ${current === 0 ? 'disabled' : ''}>← Prev</button>
        <button class="nav next" id="nextBtn" ${isAnswered ? '' : 'disabled'}>
          ${current === questions.length - 1 ? 'See Results →' : 'Next →'}
        </button>
      </div>
    </div>
  `;

  document.querySelectorAll('.option').forEach(btn => {
    btn.addEventListener('click', () => pickAnswer(parseInt(btn.dataset.i)));
  });
  document.getElementById('prevBtn').addEventListener('click', () => {
    if (current > 0) { current--; render(); }
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    current++;
    render();
  });
}

function pickAnswer(i) {
  if (userAnswers[current] !== null) return; // already answered; lock it in
  userAnswers[current] = i;
  render();
}

function renderResult() {
  const card = document.getElementById('card');
  const { score, byTopic } = computeScore();
  const pct = Math.round((score / questions.length) * 100);
  let message;
  if (pct >= 80) message = "Excellent — you're well prepared. Good luck in the real test!";
  else if (pct >= 60) message = "Decent pass — review the topics you missed and try again.";
  else if (pct >= 40) message = "Keep studying — focus on the Highway Code and road signs.";
  else message = "Plenty of room to grow. Review the FRSC Highway Code and retake the quiz.";

  const rows = Object.entries(byTopic).map(([t, v]) =>
    `<div class="breakdown-row"><span>${t}</span><span><strong>${v.correct}</strong> / ${v.total}</span></div>`
  ).join('');

  card.innerHTML = `
    <div class="result">
      <div class="result-label">Your Score</div>
      <div class="result-score">${score} / ${questions.length}</div>
      <div class="result-pct">${pct}%</div>
      <div class="result-message">${message}</div>
      <div class="breakdown">
        <h3>Breakdown by topic</h3>
        ${rows}
      </div>
      <div class="nav-buttons" style="justify-content:center; margin-top:10px;">
        <button class="nav prev" onclick="current = questions.length - 1; render();">← Review</button>
        <button class="restart" onclick="restart()">↻ Retake Quiz</button>
      </div>
    </div>
  `;
}

function restart() {
  current = 0;
  userAnswers = new Array(questions.length).fill(null);
  render();
}

render();
</script>
